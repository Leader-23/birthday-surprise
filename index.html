<!DOCTYPE html>
<html>
<head>
<title>Lindy's Birthday Surprise 🎁</title>

<style>
body{
  background:#111827;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}

#gift{
  font-size:80px;
  cursor:pointer;
  transition:transform 0.3s;
}

#gift:hover{
  transform:scale(1.2);
}

#message{
  display:none;
  font-size:30px;
  margin-top:30px;
}

canvas{
  position:fixed;
  top:0;
  left:0;
}
</style>

</head>

<body>

<h1>Lindy, someone left you a gift 👀</h1>

<div id="gift" onclick="openGift()">🎁</div>

<div id="message">
🎉 Happy 22nd Birthday, Lindy! 🎉 <br><br>
I hope today brings you laughter, good vibes,<br>
and maybe a little adventure too 😉
</div>

<canvas id="confetti"></canvas>

<script>

function openGift(){
  document.getElementById("message").style.display="block";
  startConfetti();
}

const canvas = document.getElementById("confetti");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pieces = [];

for(let i=0;i<150;i++){
  pieces.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*6+2,
    d:Math.random()*150
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="white";

  pieces.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    ctx.fill();
  });

  update();
}

function update(){
  pieces.forEach(p=>{
    p.y+=2;
    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });
}

function startConfetti(){
  setInterval(draw,20);
}

</script>

</body>
  </html>
