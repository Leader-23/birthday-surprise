<!DOCTYPE html>
<html>
<head>
<title>Lindy's Birthday Surprise 🎁</title>
<style>
body {
  margin: 0;
  padding: 0;
  background: linear-gradient(120deg, #ff9a9e, #fad0c4);
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

#gift {
  font-size: 100px;
  cursor: pointer;
  display: inline-block;
  transition: transform 0.3s;
  user-select: none;
}

#gift:hover {
  transform: scale(1.3) rotate(-10deg);
}

#message {
  display: none;
  font-size: 32px;
  margin-top: 30px;
  opacity: 0;
}

.balloon {
  position: absolute;
  width: 50px;
  height: 70px;
  background: red;
  border-radius: 50% 50% 50% 50%;
  opacity: 0.8;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-100px); }
}
</style>
</head>
<body>

<h1>Lindy, someone left you a gift 👀</h1>
<div id="gift">🎁</div>
<div id="message"></div>
<canvas id="confetti"></canvas>
<audio id="popSound" src="https://freesound.org/data/previews/341/341695_3248244-lq.mp3"></audio>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
// ---------- Confetti ----------
const canvas = document.getElementById('confetti');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const gift = document.getElementById('gift');
const message = document.getElementById('message');
const popSound = document.getElementById('popSound');

function launchConfetti() {
  const duration = 3000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 7,
      spread: 100,
      origin: { x: Math.random(), y: Math.random() * 0.5 },
      colors: ['#ff0a54','#ff477e','#ff85a1','#fbb1b1','#f9bec7'],
      shapes: ['circle', 'square', 'star', 'triangle'],
    });
    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

// ---------- Gift click ----------
gift.addEventListener('click', () => {
  popSound.play();
  message.style.display = 'block';
  typeMessage("🎉 Happy 22nd Birthday, Lindy! 🎉\nI hope today brings you laughter, good vibes, and maybe a little adventure too 😉");
  launchConfetti();
  spawnBalloons();
});

// ---------- Letter by letter message ----------
function typeMessage(text) {
  message.textContent = "";
  let i = 0;
  message.style.opacity = 1;
  const interval = setInterval(() => {
    if (i < text.length) {
      message.textContent += text[i];
      i++;
    } else {
      clearInterval(interval);
    }
  }, 40);
}

// ---------- Balloons ----------
function spawnBalloons() {
  for (let i = 0; i < 10; i++) {
    const balloon = document.createElement('div');
    balloon.classList.add('balloon');
    balloon.style.left = Math.random() * window.innerWidth + 'px';
    balloon.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
    balloon.style.animationDuration = (3 + Math.random()*2) + 's';
    document.body.appendChild(balloon);
    setTimeout(() => balloon.remove(), 5000);
  }
}
</script>

</body>
</html>
