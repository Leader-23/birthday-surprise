<!DOCTYPE html>
<html>
<head>
<title>Lindy's Birthday Surprise 🎁</title>
<style>
body {
  background: #111827;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding-top: 100px;
}

#gift {
  font-size: 80px;
  cursor: pointer;
  transition: transform 0.3s;
}

#gift:hover {
  transform: scale(1.2);
}

#message {
  display: none;
  font-size: 30px;
  margin-top: 30px;
}
</style>
</head>
<body>

<h1>Lindy, someone left you a gift 👀</h1>
<div id="gift">🎁</div>
<div id="message">
🎉 Happy 22nd Birthday, Lindy! 🎉 <br><br>
I hope today brings you laughter, good vibes,<br>
and maybe a little adventure too 😉
</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script>
const gift = document.getElementById('gift');
const message = document.getElementById('message');

gift.addEventListener('click', () => {
  message.style.display = 'block';
  // fire confetti for 2 seconds
  const duration = 2 * 1000;
  const end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 55,
      origin: { x: 0 }
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 55,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
});
</script>

</body>
</html>
